<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocVault | Secure Document Storage</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>DocVault</h1>
            <p>Secure regulatory document upload and management system</p>
        </header>

        <section class="upload-section">
            <form id="uploadForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="verticals">Verticals</label>
                        <input type="text" id="verticals" value="MCA" readonly>
                    </div>
                    <div class="form-group">
                        <label for="sub_category">SubCategory</label>
                        <select id="sub_category" required>
                            <option value="Notifications">Notifications</option>
                            <option value="Circulars">Circulars</option>
                            <option value="Press Release">Press Release</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="number" id="year" placeholder="e.g. 2024" required>
                    </div>
                    <div class="form-group">
                        <label for="month">Month</label>
                        <select id="month" required>
                            <option value="January">January</option>
                            <option value="February">February</option>
                            <option value="March">March</option>
                            <option value="April">April</option>
                            <option value="May">May</option>
                            <option value="June">June</option>
                            <option value="July">July</option>
                            <option value="August">August</option>
                            <option value="September">September</option>
                            <option value="October">October</option>
                            <option value="November">November</option>
                            <option value="December">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="issue_date">Official Issue Date</label>
                        <input type="date" id="issue_date" required>
                    </div>
                    <div class="form-group">
                        <label for="title">Document Title</label>
                        <input type="text" id="title" placeholder="e.g. Amendment to delegation" required>
                    </div>
                    <div class="form-group">
                        <label for="file">Document Source (PDF)</label>
                        <input type="file" id="file" accept=".pdf" required>
                    </div>
                </div>
                <button type="submit" id="submitBtn">Authenticate & Store Document</button>
            </form>
        </section>

        <section>
            <div class="docs-header">
                <h2>Regulatory Archive</h2>
            </div>
            <div id="documentList" class="document-grid">
                <!-- Documents will be loaded here -->
            </div>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
